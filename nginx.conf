server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Same-origin API: forward /api to the backend service on the compose network.
    # No trailing slash on proxy_pass -> the /api prefix is preserved, which is
    # what the Express app expects (its routes are mounted under /api).
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache the content-hashed build assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback: unknown paths return index.html so client-side
    # routing works on refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
