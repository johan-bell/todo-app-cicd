name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      # --- Frontend ---
      - name: Install (frontend)
        run: npm ci

      - name: Lint (frontend)
        run: npm run lint

      - name: Check formatting (frontend)
        run: npm run format:check

      - name: Typecheck (frontend)
        run: npm run typecheck

      - name: Test (frontend)
        run: npm run test

      - name: Build (frontend)
        run: npm run build

      # --- Backend ---
      - name: Install (server)
        run: npm install
        working-directory: server

      - name: Lint (server)
        run: npm run lint
        working-directory: server

      - name: Check formatting (server)
        run: npm run format:check
        working-directory: server

      - name: Typecheck (server)
        run: npm run typecheck
        working-directory: server

      - name: Test (server)
        run: npm run test
        working-directory: server

      - name: Build (server)
        run: npm run build
        working-directory: server
